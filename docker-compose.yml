# Local / CI: Nginx serves the Vite production build + /output/* (same layout as GitHub Pages).
# Hostinger VPS: same compose; shared hosting uploads dist/ + output/ manually (see docker/README.md).
services:
  tmd:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NGINX_CONF: nginx.conf
    ports:
      - "${TMD_PORT:-8080}:80"
    volumes:
      - ./output:/usr/share/nginx/html/output:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Same SPA image without a public /output/ mount (datasets only via your own hosting layer).
  tmd-private:
    profiles: ["private_static"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NGINX_CONF: nginx.no-output.conf
    ports:
      - "${TMD_PRIVATE_PORT:-8081}:80"

  smoke-test:
    image: curlimages/curl:8.11.1
    profiles: ["test"]
    depends_on:
      tmd:
        condition: service_healthy
    volumes:
      - ./docker/smoke.sh:/smoke.sh:ro
    entrypoint: ["/bin/sh", "/smoke.sh"]
