server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json text/csv text/plain;

    location = /health {
        default_type text/plain;
        access_log off;
        return 200 'ok\n';
    }

    # Same URL shape as Vite preview: /output/* (see OUTPUT_BASE in web/js/app.js)
    location /output/ {
        alias /usr/share/nginx/html/output/;
        autoindex off;
        add_header Cache-Control "public, max-age=120";
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
